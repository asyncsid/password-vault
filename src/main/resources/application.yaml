server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: password-vault
  datasource:
# -- MySQL --
    url: jdbc:mysql://mysql:3306/password_vault?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
#    url: jdbc:postgresql://localhost:5432/password_vault
#    username: ${POSTGRES_USER:vault_app}
#    password: ${POSTGRES_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
#    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: validate
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true
    jackson:
      default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.siddhartha.passwordvault: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
