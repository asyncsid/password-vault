#    restart: always
#    environment:
#      POSTGRES_PASSWORD: root123           # superuser password
#      POSTGRES_DB: password_vault
#      POSTGRES_USER: vault_app             # owns the DB; no separate password var needed
#    ports:
#      - "5432:5432"
#    volumes:
#      - postgres_data:/var/lib/postgresql/data
#      - ./postgres/init.sql:/docker-entrypoint-initdb.d/0-init.sql
#    healthcheck:
#      test: [ "CMD-SHELL", "pg_isready -U vault_app -d password_vault" ]
#      interval: 10s
#      timeout: 5s
#      retries: 10

  password-vault:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: siddhartha/password-vault:v1    # ← Tagged image
    container_name: password-vault-api
    restart: always
    ports:
      - "8080:8080"    # Application port
      - "5005:5005"    # Debug port
    environment:
      DB_USER: vault_app
      DB_PASSWORD: VaultSecure2025!
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:  # ← Survives docker compose down/up/delete
#  postgres_data: