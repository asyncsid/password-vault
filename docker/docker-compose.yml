version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: password-vault-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: password_vault
      MYSQL_USER: vault_app
      MYSQL_PASSWORD: VaultSecure2025!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql          # ← PERSISTENT STORAGE
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/0-init.sql  # ← Auto-run schema
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

#  postgres:
#    image: postgres:16-alpine
